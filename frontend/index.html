<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cellular Simulations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-gallery">

  <header class="gallery-header">
    <div>
      <h1>Cellular Simulations</h1>
    </div>
    <button class="btn-primary" id="new-btn">+ New</button>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn filter-btn--slime" data-filter="slime">Slime Mold</button>
    <button class="filter-btn filter-btn--boids" data-filter="boids">Boids</button>
    <button class="filter-btn filter-btn--fluid" data-filter="fluid">Fluid</button>
    <button class="filter-btn filter-btn--cubes" data-filter="cubes">Cubes</button>
    <button class="filter-btn filter-btn--automaton" data-filter="automaton">Automaton</button>
  </div>

  <main class="gallery-grid" id="gallery-grid">
    <!-- cards injected by main.js -->
  </main>

  <!-- Type picker overlay -->
  <div class="overlay hidden" id="type-picker">
    <div class="type-picker-panel">
      <div class="type-picker-header">
        <span>Choose a simulation type</span>
        <button class="overlay-close" id="picker-close">&#10005;</button>
      </div>
      <div class="type-options">

        <button class="type-option" data-type="slime">
          <div class="type-preview"></div>
          <div class="type-label">
            <strong>Slime Mold</strong>
            <span>Physarum-style agent trails</span>
          </div>
        </button>

        <button class="type-option" data-type="boids">
          <div class="type-preview"></div>
          <div class="type-label">
            <strong>Boids</strong>
            <span>Flocking &amp; emergence</span>
          </div>
        </button>

        <button class="type-option" data-type="fluid">
          <div class="type-preview"></div>
          <div class="type-label">
            <strong>Fluid</strong>
            <span>Ink and smoke dynamics</span>
          </div>
        </button>

        <button class="type-option" data-type="cubes">
          <div class="type-preview"></div>
          <div class="type-label">
            <strong>Cubes</strong>
            <span>3D cellular automaton</span>
          </div>
        </button>

        <button class="type-option" data-type="automaton">
          <div class="type-preview"></div>
          <div class="type-label">
            <strong>Automaton</strong>
            <span>1D elementary rules</span>
          </div>
        </button>

      </div>
    </div>
  </div>

  <script src="previews.js"></script>
  <script src="main.js"></script>
</body>
</html>
